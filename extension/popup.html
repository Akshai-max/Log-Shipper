<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logger Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Logger Config</h2>
    
    <div class="form-group">
      <label for="admin-url">Admin POST URL:</label>
      <input type="text" id="admin-url" placeholder="http://192.168.1.5:54698">
      <div id="url-error" class="error hidden">URL must start with http:// or https://</div>
    </div>

    <div class="form-group toggle-group">
      <label for="toggle-logging">Enable Logging:</label>
      <div class="switch">
        <input type="checkbox" id="toggle-logging" checked>
      </div>
    </div>

    <button id="save-btn">Save</button>
    <div id="status" class="status-msg">Status: Not Set</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
